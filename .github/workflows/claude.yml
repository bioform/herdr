name: Claude Code

# Responds when someone mentions `@claude` in:
#   - an issue or PR comment (issue_comment)
#   - a PR review comment or review submission (pull_request_review*)
#   - a new/assigned issue's body or title (issues)
# Claude can read the thread, the PR diff, and CI results, then reply or push
# commits. A mention in a PR *body/title* is intentionally NOT a trigger — see
# the `on:` block; request a PR review by commenting `@claude` on the PR.
#
# Auth uses a single repository secret (no cloud-provider infra required).
#
# One-time setup (repo admin, on bioform/herdr):
#   Settings > Secrets and variables > Actions > New repository secret
#     CLAUDE_CODE_OAUTH_TOKEN = output of `claude setup-token`
#   (Alternatively set an ANTHROPIC_API_KEY secret and change the `with:` key
#    below from `claude_code_oauth_token` to `anthropic_api_key`.)

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  # No `pull_request` trigger: claude-code-action acts only on an @claude mention
  # in a comment/review. A mention in a PR body/title on `pull_request` logs
  # "NO PROMPT / no trigger found" and skips with a misleading green check — so a
  # review is requested by commenting @claude on the PR, never via the PR body.
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read # Required for Claude to read CI results on PRs
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          show_full_output: true
          claude_args: |
            --model claude-sonnet-4-6
            --append-system-prompt "When you are asked to review a pull request, carry out a thorough, systematic code review and finish it in this same run - never reply that you will analyze it and follow up later. Work from the PR diff, read every changed file, and for each issue state a severity (Critical, High, Medium, or Low), the file and line, concrete evidence, the impact, and a specific fix. Verify every claim against the actual code, and reason about edge cases, error handling, concurrency, and behavior on each platform and environment the code targets. Note test coverage and any relevant CI results. Reply with a single structured review comment grouped by severity, with a short summary table and a coverage note; if you find nothing wrong, say so explicitly and list what you checked."
